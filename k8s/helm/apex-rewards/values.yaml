replicaCount:
  frontend: 2
  backend: 2

image:
  registry: ghcr.io/sammy-samy
  frontend:
    repository: apex-rewards-frontend
    tag: latest
    pullPolicy: IfNotPresent
  backend:
    repository: apex-rewards-backend
    tag: latest
    pullPolicy: IfNotPresent

service:
  frontend:
    port: 3000
  backend:
    port: 3001

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: apexrewards.app
      paths: ["/"]
    - host: api.apexrewards.app
      paths: ["/"]
  tls:
    - secretName: apex-rewards-tls
      hosts:
        - apexrewards.app
        - api.apexrewards.app

postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 20Gi
  database: apexrewards

redis:
  enabled: true
  image: redis:7-alpine

resources:
  frontend:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  backend:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

stellar:
  network: mainnet
  horizonUrl: https://horizon.stellar.org
  rpcUrl: https://soroban-rpc.stellar.org

monitoring:
  enabled: true
  prometheus:
    scrape: true
