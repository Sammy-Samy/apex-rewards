version: "3.9"

services:
  frontend:
    build:
      context: ./apexRewards/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_STELLAR_NETWORK=standalone
    depends_on:
      - backend
    networks:
      - apex-net
    restart: unless-stopped

  backend:
    build:
      context: ./apexRewards/backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apexRewards/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apex-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apexrewards
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apexrewards"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apex-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apex-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./apexRewards/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - apex-net
    restart: unless-stopped

  stellar:
    image: stellar/quickstart:latest
    ports:
      - "8000:8000"
    environment:
      - NETWORK=standalone
      - ENABLE_SOROBAN_RPC=true
    networks:
      - apex-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  apex-net:
    driver: bridge
